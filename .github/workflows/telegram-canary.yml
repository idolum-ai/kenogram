name: Live Telegram canary

on:
  workflow_dispatch:
    inputs:
      nonce:
        description: Unique non-secret marker to include in the operator command
        required: true
        type: string

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest
    environment: live-telegram-canary
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Install runtime tools
        run: sudo apt-get update && sudo apt-get install -y podman uidmap fuse-overlayfs
      - name: Verify rootless runtime
        run: |
          podman info --format json
          podman unshare true
      - name: Seed immutable Engram fixture
        run: |
          curl --fail --location --proto '=https' --tlsv1.2 --output /tmp/engram-v0.2.0-linux-amd64.tar.gz https://github.com/idolum-ai/engram/releases/download/v0.2.0/engram-v0.2.0-linux-amd64.tar.gz
          echo 'a4ec04e3ac2924ed391c32b0b52ec95a48a727680d9d06f60a63cf5691f98a82  /tmp/engram-v0.2.0-linux-amd64.tar.gz' | sha256sum --check
      - name: Real Telegram to Engram to OpenClaw canary
        run: make e2e-telegram-canary
        env:
          KENOGRAM_ENGRAM_ARCHIVE: /tmp/engram-v0.2.0-linux-amd64.tar.gz
          KENOGRAM_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          KENOGRAM_TELEGRAM_ALLOWED_USER_ID: ${{ secrets.TELEGRAM_ALLOWED_USER_ID }}
          KENOGRAM_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KENOGRAM_TELEGRAM_CANARY_NONCE: ${{ inputs.nonce }}
