name: Release candidate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Candidate version (vX.Y.Z)
        required: true
        type: string

permissions:
  contents: read

jobs:
  candidate:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       startsWith(github.event.pull_request.head.ref, 'release/v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Install proof tools
        run: sudo apt-get update && sudo apt-get install -y podman uidmap fuse-overlayfs ripgrep
      - name: Resolve candidate
        id: candidate
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          INPUT_VERSION: ${{ inputs.version }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" = workflow_dispatch ]]; then tag="${INPUT_VERSION}"; else tag="${HEAD_REF#release/}"; fi
          tag="$(./scripts/validate-release-version.sh "${tag}")"
          prefix="## [${tag}] - "
          heading="$(awk -v prefix="${prefix}" 'index($0, prefix) == 1 { print; exit }' CHANGELOG.md)"
          date="${heading#"${prefix}"}"
          [[ "${heading}" == "${prefix}"* && "${date}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] || {
            echo "CHANGELOG.md is missing a dated heading for ${tag}" >&2; exit 1;
          }
          if [[ "${EVENT_NAME}" = pull_request ]]; then
            printf '%s\n' "${PR_BODY}" > release-notes-source.md
            ./scripts/prepare-release-notes.sh "${tag}" "${PR_TITLE}" "${PR_URL}" release-notes-source.md release-notes-preview.md
          else
            ./scripts/generate-release-notes.sh --to HEAD --output release-notes-preview.md --title "${tag}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
      - name: Full gate
        run: make check
      - name: Vulnerability reachability
        run: make vulncheck
      - name: Race detector
        run: make test-race
      - name: Real runtime integration
        run: make integration
      - name: Package and inspect candidate
        env:
          TAG: ${{ steps.candidate.outputs.tag }}
        run: |
          set -euo pipefail
          commit="$(git rev-parse --short=12 HEAD)"
          date="$(git show -s --format=%cI HEAD)"
          make release-dist VERSION="${TAG}" COMMIT="${commit}" DATE="${date}"
          mkdir candidate-smoke
          tar -xzf "dist/kenogram-${TAG}-linux-amd64.tar.gz" -C candidate-smoke kenogram
          candidate-smoke/kenogram version | tee candidate-version.txt
          grep -F "kenogram ${TAG} commit=${commit}" candidate-version.txt >/dev/null
      - name: Summarize release notes
        run: cat release-notes-preview.md >> "${GITHUB_STEP_SUMMARY}"
      - name: Upload candidate evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kenogram-${{ steps.candidate.outputs.tag }}-candidate
          path: |
            dist/*
            candidate-version.txt
            release-notes-preview.md
          if-no-files-found: error
