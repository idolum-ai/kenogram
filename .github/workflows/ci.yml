name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 2"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.scope.outputs.mode }}
    steps:
      - name: Check out trusted CI policy
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.workflow_sha }}
          path: .ci-policy
          persist-credentials: false
      - name: Check out proposed tree
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          path: source
          persist-credentials: false
      - name: Classify change
        id: scope
        working-directory: source
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PATH_AWARE_ENABLED: ${{ vars.PATH_AWARE_CI_ENABLED }}
        run: |
          set -euo pipefail
          mode="$(bash ../.ci-policy/scripts/select-ci-mode.sh \
            "${EVENT_NAME}" "${BASE_SHA}" "${HEAD_SHA}" \
            ../.ci-policy/scripts/classify-ci-paths.sh \
            "${PATH_AWARE_ENABLED}")"
          [[ "${mode}" = editorial || "${mode}" = full ]]
          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"
          echo "CI mode: **${mode}**" >> "${GITHUB_STEP_SUMMARY}"
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        if: steps.scope.outputs.mode == 'full'
        with:
          go-version-file: source/go.mod
          cache: false
      - name: Install check tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Editorial gate
        if: steps.scope.outputs.mode == 'editorial'
        working-directory: source
        run: make architecture docs-freshness secrets workflow-sanity
      - name: Full gate
        if: steps.scope.outputs.mode == 'full'
        working-directory: source
        run: make check
      - name: Vulnerability reachability
        if: steps.scope.outputs.mode == 'full'
        working-directory: source
        run: make vulncheck
      - name: Test evidence
        id: test-evidence
        if: steps.scope.outputs.mode == 'full'
        working-directory: source
        run: make test-evidence
      - name: Retain test evidence
        if: always() && steps.scope.outputs.mode == 'full' && steps.test-evidence.outcome != 'skipped'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-test-evidence
          path: source/artifacts/
          if-no-files-found: error

  race:
    needs: check
    if: needs.check.outputs.mode == 'full'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Race detector
        run: make test-race

  apple-host:
    needs: check
    if: needs.check.outputs.mode == 'full'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Native Apple launcher contract
        run: |
          go test ./internal/backend -run '^(TestAppleMachine|TestExecRunner)' -count=1
          go test ./cmd/kenogram -run '^TestLauncher' -count=1
          go build -buildvcs=false -o bin/kenogram ./cmd/kenogram
          file bin/kenogram | grep -F 'arm64'
          ./bin/kenogram version
          ./bin/kenogram help
          if ./bin/kenogram status ci-smoke >apple-host.out 2>&1; then
            echo 'macOS runtime command unexpectedly selected an implicit backend' >&2
            exit 1
          fi
          grep -F 'on macOS select apple-container-machine with KENOGRAM_RUNTIME' apple-host.out

  runtime:
    needs: [check, race]
    if: needs.check.outputs.mode == 'full'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Install runtime tools
        run: sudo apt-get update && sudo apt-get install -y podman uidmap fuse-overlayfs openssh-client
      - name: Verify rootless runtime
        run: |
          podman info --format json
          podman unshare true
          go run ./cmd/kenogram doctor --json | tee doctor.json
          grep -F '"ready": true' doctor.json
      - name: Reference-world surface
        run: |
          set -euo pipefail
          tag="localhost/kenogram-reference-ci:${GITHUB_SHA}"
          trap 'podman image rm "${tag}" >/dev/null 2>&1 || true' EXIT
          podman build --pull=missing \
            --build-arg "USER_ID=$(id -u)" --build-arg "GROUP_ID=$(id -g)" \
            --tag "${tag}" --file images/reference-world/Containerfile images/reference-world
          podman run --rm --userns keep-id --user "$(id -u):$(id -g)" \
            --entrypoint /bin/sh "${tag}" -c 'test -x /usr/bin/tail && test -x /bin/sh && test -x /usr/bin/tmux && tmux -V'
      - name: Integration
        run: make integration
      - name: SSH composition without a host listener
        run: make e2e-ssh
      - name: Restore immutable Engram fixture
        id: engram-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/engram-v0.3.0-linux-amd64.tar.gz
          key: engram-v0.3.0-linux-amd64-f8ef677d964ba8b86394d2e535fc195da206cbdf84029c9fc7593ebe3675c677
      - name: Seed immutable Engram fixture
        if: steps.engram-cache.outputs.cache-hit != 'true'
        run: |
          curl --fail --location --proto '=https' --tlsv1.2 --output /tmp/engram-v0.3.0-linux-amd64.tar.gz https://github.com/idolum-ai/engram/releases/download/v0.3.0/engram-v0.3.0-linux-amd64.tar.gz
          echo 'f8ef677d964ba8b86394d2e535fc195da206cbdf84029c9fc7593ebe3675c677  /tmp/engram-v0.3.0-linux-amd64.tar.gz' | sha256sum --check
      - name: Restore immutable OpenClaw fixture
        id: openclaw-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/openclaw-2026.6.11.tgz
          key: openclaw-2026.6.11-3b3165508391b82b38e62189979df589a45a2d8019a8ef7910fccc554649ce7b
      - name: Seed immutable OpenClaw fixture
        if: steps.openclaw-cache.outputs.cache-hit != 'true'
        run: |
          curl --fail --location --proto '=https' --tlsv1.2 --output /tmp/openclaw-2026.6.11.tgz https://registry.npmjs.org/openclaw/-/openclaw-2026.6.11.tgz
          echo '3b3165508391b82b38e62189979df589a45a2d8019a8ef7910fccc554649ce7b  /tmp/openclaw-2026.6.11.tgz' | sha256sum --check
      - name: Engram release E2E
        run: make e2e-release
        env:
          KENOGRAM_ENGRAM_ARCHIVE: /tmp/engram-v0.3.0-linux-amd64.tar.gz
          KENOGRAM_VERIFY_UPSTREAM: ${{ github.event_name == 'schedule' && '1' || '0' }}
      - name: OpenClaw isolation, native Telegram, and TUI E2E
        run: make e2e-openclaw
        env:
          KENOGRAM_OPENCLAW_ARCHIVE: /tmp/openclaw-2026.6.11.tgz
      - name: Engram controls OpenClaw through fake Telegram
        run: make e2e-composition
        env:
          KENOGRAM_ENGRAM_ARCHIVE: /tmp/engram-v0.3.0-linux-amd64.tar.gz
          KENOGRAM_VERIFY_UPSTREAM: ${{ github.event_name == 'schedule' && '1' || '0' }}

  runtime-hermes:
    needs: [check, race]
    if: needs.check.outputs.mode == 'full'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Install runtime tools
        run: sudo apt-get update && sudo apt-get install -y podman uidmap fuse-overlayfs tmux
      - name: Verify rootless runtime
        run: |
          podman info --format json
          podman unshare true
      - name: Restore immutable Hermes source fixture
        id: hermes-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/hermes-agent-v2026.7.7.2.tar.gz
          key: hermes-agent-v2026.7.7.2-f5d1022eed3763a768cf7b0f0844831f0170a35f54eb8d18223f2e93f503025e
      - name: Seed immutable Hermes source fixture
        if: steps.hermes-cache.outputs.cache-hit != 'true'
        run: |
          curl --fail --location --proto '=https' --tlsv1.2 --output /tmp/hermes-agent-v2026.7.7.2.tar.gz https://github.com/NousResearch/hermes-agent/archive/refs/tags/v2026.7.7.2.tar.gz
          echo 'f5d1022eed3763a768cf7b0f0844831f0170a35f54eb8d18223f2e93f503025e  /tmp/hermes-agent-v2026.7.7.2.tar.gz' | sha256sum --check
      - name: Restore immutable Engram fixture
        id: hermes-engram-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/engram-v0.3.0-linux-amd64.tar.gz
          key: engram-v0.3.0-linux-amd64-f8ef677d964ba8b86394d2e535fc195da206cbdf84029c9fc7593ebe3675c677
      - name: Seed immutable Engram fixture
        if: steps.hermes-engram-cache.outputs.cache-hit != 'true'
        run: |
          curl --fail --location --proto '=https' --tlsv1.2 --output /tmp/engram-v0.3.0-linux-amd64.tar.gz https://github.com/idolum-ai/engram/releases/download/v0.3.0/engram-v0.3.0-linux-amd64.tar.gz
          echo 'f8ef677d964ba8b86394d2e535fc195da206cbdf84029c9fc7593ebe3675c677  /tmp/engram-v0.3.0-linux-amd64.tar.gz' | sha256sum --check
      - name: Hermes isolation, native Telegram, and TUI E2E
        run: make e2e-hermes
        env:
          KENOGRAM_HERMES_ARCHIVE: /tmp/hermes-agent-v2026.7.7.2.tar.gz
      - name: Engram controls Hermes through fake Telegram
        run: make e2e-hermes-composition
        env:
          KENOGRAM_HERMES_ARCHIVE: /tmp/hermes-agent-v2026.7.7.2.tar.gz
          KENOGRAM_ENGRAM_ARCHIVE: /tmp/engram-v0.3.0-linux-amd64.tar.gz
          KENOGRAM_VERIFY_UPSTREAM: ${{ github.event_name == 'schedule' && '1' || '0' }}

  required:
    if: always()
    needs: [check, race, apple-host, runtime, runtime-hermes]
    runs-on: ubuntu-latest
    env:
      APPLE_HOST_RESULT: ${{ needs.apple-host.result }}
      CHECK_RESULT: ${{ needs.check.result }}
      CI_MODE: ${{ needs.check.outputs.mode }}
      RACE_RESULT: ${{ needs.race.result }}
      RUNTIME_HERMES_RESULT: ${{ needs.runtime-hermes.result }}
      RUNTIME_RESULT: ${{ needs.runtime.result }}
    steps:
      - name: Check out trusted CI policy
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.workflow_sha }}
          path: .ci-policy
          persist-credentials: false
      - name: Verify required evidence
        run: >-
          bash .ci-policy/scripts/verify-ci-results.sh
          "${CI_MODE}" "${CHECK_RESULT}" "${RACE_RESULT}"
          "${APPLE_HOST_RESULT}" "${RUNTIME_RESULT}" "${RUNTIME_HERMES_RESULT}"

  nightly-native:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Bounded parser fuzzing
        run: go test ./internal/decl -run '^$' -fuzz FuzzParse -fuzztime 60s
