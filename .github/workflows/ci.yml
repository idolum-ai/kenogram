name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 2"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Install check tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Check
        run: make check
      - name: Test evidence
        run: make test-evidence
      - name: Retain test evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-test-evidence
          path: artifacts/
          if-no-files-found: error

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Race detector
        run: make test-race

  runtime:
    needs: [check, race]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Install runtime tools
        run: sudo apt-get update && sudo apt-get install -y podman uidmap fuse-overlayfs
      - name: Verify rootless runtime
        run: |
          podman info --format json
          podman unshare true
      - name: Integration
        run: make integration
      - name: Restore immutable Engram fixture
        id: engram-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/engram-v0.1.0-linux-amd64.tar.gz
          key: engram-v0.1.0-linux-amd64-6c6fa2ec4644bfc1cd4d294d734f0b3e0a664f1799dda11ffd1db148f2bcfb25
      - name: Seed immutable Engram fixture
        if: steps.engram-cache.outputs.cache-hit != 'true'
        run: |
          curl --fail --location --proto '=https' --tlsv1.2 --output /tmp/engram-v0.1.0-linux-amd64.tar.gz https://github.com/idolum-ai/engram/releases/download/v0.1.0/engram-v0.1.0-linux-amd64.tar.gz
          echo '6c6fa2ec4644bfc1cd4d294d734f0b3e0a664f1799dda11ffd1db148f2bcfb25  /tmp/engram-v0.1.0-linux-amd64.tar.gz' | sha256sum --check
      - name: Engram release E2E
        run: make e2e
        env:
          KENOGRAM_ENGRAM_ARCHIVE: /tmp/engram-v0.1.0-linux-amd64.tar.gz
          KENOGRAM_VERIFY_UPSTREAM: ${{ github.event_name == 'schedule' && '1' || '0' }}

  nightly-native:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Bounded parser fuzzing
        run: go test ./internal/decl -run '^$' -fuzz FuzzParse -fuzztime 60s
      - name: Vulnerability reachability
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
