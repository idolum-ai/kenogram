name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install check tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep podman uidmap fuse-overlayfs
      - name: Check
        run: make check
      - name: Verify rootless runtime
        run: |
          podman info --format json
          podman unshare true
      - name: Integration
        run: make integration
      - name: Engram release E2E
        run: make e2e
